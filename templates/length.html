<!DOCTYPE html>
<html>
    <head>
    <title>DM Unit Converter - Length</title>
    </head>
    <body>

        <h1>Length Converter</h1>
    
        <label>Enter length:</label>
    <form>
            <input 
            type="number" 
            name="value" 
            id="value" 
            step="0.01">
        <select name="from_unit"></select>
        <select name="to_unit"></select>
        <button id="convert">Convert</button>
    </form>
    </body>
</html>
